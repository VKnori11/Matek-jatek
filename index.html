<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Szuper Matek Játék</title>
<style>
body { font-family: sans-serif; text-align: center; background-color: #f0f8ff; }
.box { background: white; padding: 20px; border-radius: 15px; display: inline-block; margin-top: 50px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
input { width: 50px; font-size: 20px; }
button { font-size: 20px; cursor: pointer; background-color: #4CAF50; color: white; border: none; padding: 10px; border-radius: 5px; }
#message { font-weight: bold; margin-top: 15px; }
</style>
</head>
<body>
<div class="box">
<h1>Mennyi az annyi? 🧮</h1>
<p id="question" style="font-size: 24px;"></p>
<input type="number" id="answer">
<button onclick="check()">Ellenőrzés</button>
<p id="message"></p>
<button onclick="nextQuestion()">Új feladat</button>
</div>

<script>
let result;
function nextQuestion() {
let num1 = Math.floor(Math.random() * 10) + 1;
let num2 = Math.floor(Math.random() * 10) + 1;
result = num1 + num2;
document.getElementById('question').innerText = `${num1} + ${num2} = ?`;
document.getElementById('answer').value = "";
document.getElementById('message').innerText = "";
}
function check() {
let userAnswer = document.getElementById('answer').value;
if(userAnswer == result) {
document.getElementById('message').innerText = "✅ Ügyes vagy! Helyes!";
document.getElementById('message').style.color = "green";
} else {
document.getElementById('message').innerText = "❌ Próbáld újra!";
document.getElementById('message').style.color = "red";
}
}
nextQuestion();
</script>
</body>
</html>
